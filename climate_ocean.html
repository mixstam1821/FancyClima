<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #3c3c7e; font-family: monospace; color: #ccc; overflow-x: hidden; }
#page-title {
  font-size: 18px; letter-spacing: 0.16em; color: rgba(1, 255, 213, 0.35)35);
  text-align: center; padding: 16px 0 4px;
}
#global-controls {
  display: flex; gap: 24px; align-items: center; justify-content: center;
  padding: 6px 0 10px;
  font-size: 10px; color: rgba(145, 255, 123, 0.3); letter-spacing: 0.1em;
}
#global-controls label { display: flex; gap: 7px; align-items: center; cursor: pointer; }
#global-controls input[type=range] { width: 90px; accent-color: rgba(180,150,255,0.7); }
#grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 20px;
  padding: 10px 24px 32px;
  max-width: 1820px;
  margin: 0 auto;
}
.map-block { display: flex; flex-direction: column; gap: 4px; }
.map-title { font-size: 15px; letter-spacing: 0.13em; color: rgba(233, 255, 39, 0.9); }
.map-wrap { position: relative; }
.map-wrap canvas { display: block; width: 100%; border: 0.5px solid rgba(255,255,255,0.12); }
.map-status { font-size: 9px; color: rgba(255,255,255,0.22); letter-spacing: 0.08em; }
#tooltip {
  position: fixed; pointer-events: none; display: none;
  background: rgba(8,8,20,0.95); border: 0.5px solid rgba(255,255,255,0.2);
  padding: 7px 12px; font-size: 11px; color: #ddd; border-radius: 3px;
  white-space: nowrap; z-index: 200; line-height: 1.6;
}
</style>

  Plasma:d3.interpolatePlasma, Viridis:d3.interpolateViridis,
  Blues:d3.interpolateInferno,   Cool:d3.interpolateCividis,
  YlOrRd:d3.interpolateWarm,Greens:d3.interpolateGreens,
  PuBuGn:d3.interpolateCubehelixDefault,Inferno:d3.interpolatePuRd,
  RdPu:d3.interpolateRdPu,    Magma:d3.interpolateMagma,
};

function decodeField(vInfo){
  const raw=atob(vInfo.b64), n=NY*NX, arr=new Float64Array(n);
  const range=vInfo.vmax-vInfo.vmin;
  for(let i=0;i<n;i++){
    const hi=raw.charCodeAt(i*2), lo=raw.charCodeAt(i*2+1);
    let s=(hi<<8)|lo; if(s>32767)s-=65536;
    arr[i]=vInfo.vmin+(s/32767)*range;
  }
  return arr;
}

/* ── WebGL ── */
const VERT=`attribute vec2 a_pos; varying vec2 v_uv;
void main(){ v_uv=a_pos*0.5+0.5; gl_Position=vec4(a_pos,0,1); }`;

const FRAG=`precision mediump float;\n  uniform sampler2D u_tex;\n  uniform float u_t;\n  uniform float u_amp;\n  uniform float u_wf;\n  varying vec2 v_uv;\n  void main(){\n    // canvas coords: px in [0..W], py in [0..H] with py=0 at TOP\n    // v_uv.y=0 is bottom in GL, so canvas py = (1.0-v_uv.y)*H\n    float nx = v_uv.x * 6.2832;\n    float ny = (1.0 - v_uv.y) * 6.2832;   // wave phase in natural top-down screen space\n    float dx = u_amp * (\n        sin(u_wf*nx - 2.1*u_t + 0.5*ny)\n      + 0.55*sin((u_wf+1.0)*nx*0.7 + 1.3*u_t - 0.4*ny + 1.1)\n      + 0.28*cos((u_wf+2.0)*nx     - 0.8*u_t + ny*3.0 - 0.7)\n    );\n    float dy = u_amp * (\n        0.65*sin(u_wf*0.9*ny - 1.7*u_t + nx*2.0 + 2.3)\n      + 0.35*cos(u_wf*ny     + 2.3*u_t - nx     + 0.5)\n    );\n    // sample: shift canvas px by dx pixels, py by dy pixels\n    // src_uv.x = (px+dx)/W = v_uv.x + dx/W_norm  (dx is in pixels, need to normalize)\n    // src_uv.y = v_uv.y - dy/H_norm  (subtract because canvas-y and GL-y are opposite)\n    vec2 src_uv = clamp(\n      vec2(v_uv.x + dx/840.0, v_uv.y - dy/500.0),\n      0.0, 1.0\n    );\n    gl_FragColor = texture2D(u_tex, src_uv);\n  }`;

function makeGL(canvas){
  const gl=canvas.getContext('webgl',{antialias:false,alpha:false,preserveDrawingBuffer:false});
  if(!gl) return null;
  function mkShader(type,src){const s=gl.createShader(type);gl.shaderSource(s,src);gl.compileShader(s);return s;}
  const prog=gl.createProgram();
  gl.attachShader(prog,mkShader(gl.VERTEX_SHADER,VERT));
  gl.attachShader(prog,mkShader(gl.FRAGMENT_SHADER,FRAG));
  gl.linkProgram(prog); gl.useProgram(prog);
  const buf=gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER,buf);
  gl.bufferData(gl.ARRAY_BUFFER,new Float32Array([-1,-1,1,-1,-1,1,1,1]),gl.STATIC_DRAW);
  const a=gl.getAttribLocation(prog,'a_pos');
  gl.enableVertexAttribArray(a); gl.vertexAttribPointer(a,2,gl.FLOAT,false,0,0);
  return{gl, uT:gl.getUniformLocation(prog,'u_t'),
             uAmp:gl.getUniformLocation(prog,'u_amp'),
             uWf:gl.getUniformLocation(prog,'u_wf')};
}

function uploadTex(gl,canvas){
  const t=gl.createTexture();
  gl.bindTexture(gl.TEXTURE_2D,t);
  gl.texImage2D(gl.TEXTURE_2D,0,gl.RGBA,gl.RGBA,gl.UNSIGNED_BYTE,canvas);
  gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_MIN_FILTER,gl.LINEAR);
  gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_MAG_FILTER,gl.LINEAR);
  gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_WRAP_S,gl.CLAMP_TO_EDGE);
  gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_WRAP_T,gl.CLAMP_TO_EDGE);
}

/* ── lon/lat → canvas px (top-left origin) ── */
function ll2xy(lon,lat){
  return[(lon-LON_MIN)/(LON_MAX-LON_MIN)*W,
         (lat-LAT_MIN)/(LAT_MAX-LAT_MIN)*H];
}

/* ── Draw colorbar + lat/lon labels on a 2D overlay canvas (never enters WebGL) ── */
function drawOverlay(overlayCanvas, key, vInfo){
  const interp=CMAPS[vInfo.cmap]||d3.interpolatePlasma;
  const {vmin,vmax,nlevels}=vInfo;
  const ctx=overlayCanvas.getContext('2d');
  const barW=220, barH=11, barX=W/2-110, barY=H-50;

  /* gradient bar */
  const grad=ctx.createLinearGradient(barX,0,barX+barW,0);
  for(let s=0;s<=20;s++) grad.addColorStop(s/20, interp(s/20));
  ctx.fillStyle=grad;
  ctx.fillRect(barX,barY,barW,barH);

  /* ticks + labels */
  const thresholds=[];
  for(let k=0;k<=nlevels;k++) thresholds.push(vmin+k*(vmax-vmin)/nlevels);
  ctx.strokeStyle='rgba(255,255,255,1)';
  ctx.lineWidth=0.8;
  ctx.fillStyle='rgba(255,255,255,1)';
  ctx.font='8px monospace';
  ctx.textAlign='center';
  thresholds.forEach(v=>{
    const tx=barX+(v-vmin)/(vmax-vmin)*barW;
    ctx.beginPath(); ctx.moveTo(tx,barY+barH); ctx.lineTo(tx,barY+barH+5); ctx.stroke();
    ctx.fillText(v.toFixed(1), tx, barY+barH+14);
  });

  /* lat labels */
  ctx.font='7px monospace';
  ctx.fillStyle='rgba(255,255,255,0.28)';
  ctx.textAlign='left';
  [35,45,55,65].forEach(lat=>{
    const [x,y]=ll2xy(LON_MIN+0.3,lat);
    ctx.fillText(lat+'°N', x, y+3);
  });

  /* lon labels */
  ctx.textAlign='center';
  [-20,0,20,40].forEach(lon=>{
    const [x,y]=ll2xy(lon,LAT_MIN+1.5);
    ctx.fillText(lon===0?'0°':(lon>0?lon+'°E':Math.abs(lon)+'°W'), x, y);
  });
}

/* ── Build static map: contours + coastlines → srcCanvas (NO colorbar/labels here) ── */
function buildStatic(key, vInfo, values, onDone){
  const interp=CMAPS[vInfo.cmap]||d3.interpolatePlasma;
  const {vmin,vmax,nlevels}=vInfo;
  const thresholds=[];
  for(let k=0;k<=nlevels;k++) thresholds.push(vmin+k*(vmax-vmin)/nlevels);
  const colorScale=d3.scaleSequential(interp).domain([vmin,vmax]);

  const contourData=d3.contours().size([NX,NY]).smooth(true)
    .thresholds(thresholds.slice(0,-1))(values);

  const pathGen=d3.geoPath().projection(d3.geoTransform({
    point:function(x,y){ this.stream.point(
      x*(W/NX),
      H - y*(H/NY)
    );}
  }));

  const svgNS='http://www.w3.org/2000/svg';
  const svg=document.createElementNS(svgNS,'svg');
  svg.setAttribute('xmlns','http://www.w3.org/2000/svg');
  svg.setAttribute('width',W); svg.setAttribute('height',H);
  svg.setAttribute('viewBox','0 0 '+W+' '+H);

  /* background */
  const bg=document.createElementNS(svgNS,'rect');
  bg.setAttribute('width',W);bg.setAttribute('height',H);bg.setAttribute('fill','#3F4F88');
  svg.appendChild(bg);

  /* contour fills */
  contourData.forEach(d=>{
    const p=document.createElementNS(svgNS,'path');
    p.setAttribute('d',pathGen(d));
    p.setAttribute('fill',colorScale(d.value));
    p.setAttribute('stroke','none');
    svg.appendChild(p);
  });
  /* contour lines */
  contourData.forEach(d=>{
    const p=document.createElementNS(svgNS,'path');
    p.setAttribute('d',pathGen(d));
    p.setAttribute('fill','none');
    p.setAttribute('stroke','rgba(0,0,0,0.28)');
    p.setAttribute('stroke-width','0.5');
    svg.appendChild(p);
  });

  /* graticule — baked into SVG so it warps with the map */
  for(let lon=-20;lon<=40;lon+=10){
    const [x0,y0]=ll2xy(lon,LAT_MAX), [x1,y1]=ll2xy(lon,LAT_MIN);
    const l=document.createElementNS(svgNS,'line');
    l.setAttribute('x1',x0);l.setAttribute('y1',y0);l.setAttribute('x2',x1);l.setAttribute('y2',y1);
    l.setAttribute('stroke','rgba(255,255,255,0.07)');l.setAttribute('stroke-width','0.4');
    svg.appendChild(l);
  }
  for(let lat=35;lat<=70;lat+=10){
    const [x0,y0]=ll2xy(LON_MIN,lat), [x1,y1]=ll2xy(LON_MAX,lat);
    const l=document.createElementNS(svgNS,'line');
    l.setAttribute('x1',x0);l.setAttribute('y1',y0);l.setAttribute('x2',x1);l.setAttribute('y2',y1);
    l.setAttribute('stroke','rgba(255,255,255,0.07)');l.setAttribute('stroke-width','0.4');
    svg.appendChild(l);
  }

  /* coastlines — baked into SVG so they warp with the map */
  for(const ring of COAST){
    let d='';
    for(let i=0;i<ring.length;i++){
      const [px,py]=ll2xy(ring[i][0],ring[i][1]);
      d+=(i===0?'M':'L')+px.toFixed(1)+' '+py.toFixed(1);
    }
    const path=document.createElementNS(svgNS,'path');
    path.setAttribute('d',d);
    path.setAttribute('fill','none');
    path.setAttribute('stroke','rgba(255, 251, 251, 1)');
    path.setAttribute('stroke-width','0.75');
    path.setAttribute('stroke-linejoin','round');
    svg.appendChild(path);
  }

  /* SVG → blob → image → draw on srcCanvas */
  const blob=new Blob([new XMLSerializer().serializeToString(svg)],{type:'image/svg+xml;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const img=new Image();
  img.onload=()=>{URL.revokeObjectURL(url); onDone(img);};
  img.onerror=e=>console.error('SVG err',key,e);
  img.src=url;
}

/* ── Maps registry ── */
const GLMAPS=[];
let READY=0;
const TOTAL=Object.keys(ERA5.vars).length;
let tStart=null;

function buildMap(key,vInfo){
  const values=decodeField(vInfo);

  const block=document.createElement('div'); block.className='map-block';
  const titleEl=document.createElement('div'); titleEl.className='map-title';
  titleEl.textContent=vInfo.label.toUpperCase()+' · '+vInfo.units;
  block.appendChild(titleEl);

  const wrap=document.createElement('div'); wrap.className='map-wrap';
  wrap.style.position='relative';

  const srcCanvas=document.createElement('canvas');
  srcCanvas.width=W; srcCanvas.height=H; srcCanvas.style.display='none';

  const glCanvas=document.createElement('canvas');
  glCanvas.width=W; glCanvas.height=H; glCanvas.style.cursor='crosshair';

  /* overlay canvas: sits on top of glCanvas, never enters WebGL */
  const overlayCanvas=document.createElement('canvas');
  overlayCanvas.width=W; overlayCanvas.height=H;
  overlayCanvas.style.position='absolute';
  overlayCanvas.style.top='0'; overlayCanvas.style.left='0';
  overlayCanvas.style.pointerEvents='none';

  wrap.appendChild(srcCanvas);
  wrap.appendChild(glCanvas);
  wrap.appendChild(overlayCanvas);
  block.appendChild(wrap);

  const statusEl=document.createElement('div'); statusEl.className='map-status';
  block.appendChild(statusEl);
  document.getElementById('grid').appendChild(block);

  buildStatic(key, vInfo, values, (img)=>{
    const sctx=srcCanvas.getContext('2d');
    sctx.drawImage(img,0,0,W,H);

    const glCtx=makeGL(glCanvas);
    if(!glCtx){statusEl.textContent='WebGL unavailable';return;}
    uploadTex(glCtx.gl, srcCanvas);
    drawOverlay(overlayCanvas, key, vInfo);
    GLMAPS.push({glCtx, phaseOff:Math.random()*Math.PI*2});
    READY++;
    if(READY===TOTAL && !tStart){tStart=performance.now(); tick();}
  });

  glCanvas.addEventListener('mousemove',e=>{
    const rect=glCanvas.getBoundingClientRect();
    const px=(e.clientX-rect.left)/rect.width;
    const py=(e.clientY-rect.top)/rect.height;
    const lon=LON_MIN+px*(LON_MAX-LON_MIN);
    const lat=LAT_MAX-py*(LAT_MAX-LAT_MIN);
    const ix=Math.max(0,Math.min(NX-1,Math.round(px*(NX-1))));
    const iy=Math.max(0,Math.min(NY-1,Math.round(py*(NY-1))));
    tooltip.style.display='block';
    tooltip.style.left=(e.clientX+16)+'px';
    tooltip.style.top=(e.clientY-36)+'px';
    tooltip.innerHTML='lon '+lon.toFixed(1)+'° lat '+lat.toFixed(1)+'°<br>'+
      vInfo.label+' = <b>'+values[iy*NX+ix].toFixed(2)+' '+vInfo.units+'</b>';
  });
  glCanvas.addEventListener('mouseleave',()=>tooltip.style.display='none');
}

function tick(){
  const elapsed=(performance.now()-tStart)/1000;
  const spd=parseFloat(gSpd.value),amp=parseFloat(gAmp.value),wf=parseFloat(gWfreq.value);
  const t=elapsed*spd;
  for(const m of GLMAPS){
    const {gl,uT,uAmp,uWf}=m.glCtx;
    gl.uniform1f(uT, t+m.phaseOff);
    gl.uniform1f(uAmp, amp);
    gl.uniform1f(uWf,  wf);
    gl.drawArrays(gl.TRIANGLE_STRIP,0,4);
  }
  requestAnimationFrame(tick);
}

for(const [key,vInfo] of Object.entries(ERA5.vars)) buildMap(key,vInfo);
</script>
